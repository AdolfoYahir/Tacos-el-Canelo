<div class="bebidas-container container mt-4">
  
  <!-- Header con información -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Bebidas</h2>
    <div class="text-end">
      <div *ngIf="!pedidosPermitidos()" class="estado-cerrado text-danger">
        Los pedidos están cerrados
      </div>
      <div *ngIf="pedidosPermitidos()" class="estado-abierto text-success">
        Pedidos abiertos
      </div>
    </div>
  </div>
  
  <div class="d-flex justify-content-between mb-3">
    <button class="btn btn-secondary" (click)="regresar()">
      ← Volver al Menú
    </button>
    
    <button class="btn btn-info" (click)="siguiente()">
      Ver Carrito →
    </button>
  </div>
  
  <!-- Mensaje si no hay bebidas disponibles -->
  <div *ngIf="bebidas.length === 0" class="alert alert-info text-center">
    No hay bebidas disponibles en este momento
  </div>
  
  <!-- Lista de bebidas -->
  <div class="row">
    <div *ngFor="let bebida of bebidas" class="col-md-4 mb-3">
      <div class="card h-100" [class.border-danger]="!bebida.disponible" [class.border-success]="bebida.disponible">
        
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-start">
            <h5 class="card-title">{{ bebida.nombre }}</h5>
            <span class="badge bg-primary">${{ bebida.precio }}</span>
          </div>
          
          <!-- Indicador de disponibilidad (simplificado) -->
          <div class="mb-3">
            <span class="badge" 
                  [class.bg-success]="bebida.disponible"
                  [class.bg-secondary]="!bebida.disponible">
              {{ bebida.disponible ? 'Disponible' : 'Agotado' }}
            </span>
          </div>
          
          <!-- Controles de cantidad (sin límite de stock) -->
          <div class="d-flex align-items-center justify-content-between mb-3">
            <label class="fw-bold">Cantidad:</label>
            <div class="d-flex align-items-center">
              <button class="btn btn-sm btn-danger" 
                      (click)="quitar(bebida)"
                      [disabled]="bebida.cantidad === 0 || !bebida.disponible">
                -
              </button>
              
              <span class="mx-3 fs-5">{{ bebida.cantidad }}</span>
              
              <button class="btn btn-sm btn-success" 
                      (click)="agregar(bebida)"
                      [disabled]="!bebida.disponible">
                +
              </button>
            </div>
          </div>
          
          <!-- Indicador de no disponible -->
          <div *ngIf="!bebida.disponible" class="text-danger mt-2 text-center">
            <small>Producto agotado</small>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Botón único para agregar pedido completo de bebidas -->
  <div class="fixed-bottom bg-light p-3 border-top">
    <div class="container">
      <div class="row">
        <div class="col-12 d-flex justify-content-center">
          <button class="btn btn-success btn-lg px-5" 
                  (click)="agregarPedidoCompleto()"
                  [disabled]="!pedidosPermitidos() || !hayBebidasSeleccionadas()">
            AGREGAR BEBIDAS AL PEDIDO
          </button>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Espacio para el botón fijo -->
  <div style="height: 100px;"></div>
</div>
