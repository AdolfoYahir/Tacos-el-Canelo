<div class="registro-container">

  <h1>Completa tu perfil</h1>
  <p class="hint">Solo necesitamos un par de datos más para completar tu registro.</p>

  <input
    type="tel"
    placeholder="Número de teléfono"
    [(ngModel)]="telefono"
    class="input-field"
    maxlength="10"
  />
  <p class="hint">Ingresa un número de 10 dígitos sin espacios ni guiones</p>

  <input
    type="text"
    placeholder="Dirección"
    [(ngModel)]="direccion"
    class="input-field"
  />
  <p class="hint">Ejemplo: Álvaro Obregón #205, Colonia Centro</p>

  <p class="error-msg" *ngIf="errorMsg">{{ errorMsg }}</p>

  <button class="btn-registrar" (click)="completarPerfil()" [disabled]="cargando">
    {{ cargando ? 'Guardando...' : 'Guardar perfil' }}
  </button>

  <button class="btn-regresar" (click)="irALogin()">
    Regresar
  </button>

</div>
