<div class="container text-center mt-5">

  <img src="img/Logo.png" class="card-img-top" alt="OP" style="width: 150px;">

  <h2>Iniciar sesión</h2>

  <input class="form-control my-2"
         placeholder="Usuario o teléfono"
         [(ngModel)]="usuario">

  <input type="password"
         class="form-control my-2"
         placeholder="Contraseña"
         [(ngModel)]="password">

  <button class="btn btn-success w-100"
          (click)="ingresar()">
    Entrar
  </button>

  <button class="btn btn-primary w-100 mt-2"
          (click)="registrarse()">
    Registrarse
  </button>

  <a href="#" 
     class="d-block mt-3"
     (click)="olvidarPassword()">
     ¿Se te olvidó la contraseña?
  </a>
</div>
