<div class="login-container">

  <div class="logo-section">
    <img src="img/Logo.png" alt="Tacos El Canelo" class="logo" />
    <h1>Iniciar sesión</h1>
  </div>

  <div class="form-section">

    <input
      type="text"
      placeholder="Usuario"
      [(ngModel)]="nombre"
      class="input-field"
    />

    <input
      type="password"
      placeholder="Contrasena"
      [(ngModel)]="contrasena"
      class="input-field"
    />

    <p class="error-msg" *ngIf="errorMsg">{{ errorMsg }}</p>

    <button
      class="btn-entrar"
      (click)="iniciarSesion()"
      [disabled]="cargando"
    >
      {{ cargando ? 'Cargando...' : 'Entrar' }}
    </button>

    <button class="btn-registrar" (click)="irARegistro()">
      Registrarse
    </button>

    <a class="link-olvide">¿Se te olvidó la contraseña?</a>

  </div>
</div>
